<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook&display=swap" rel="stylesheet">
    <title>Setup Tic Tac Toe</title>
    <style>
        @font-face {
            font-family: 'UnifrakturCook';
            src: url("/static/UnifrakturCook.woff2") format('woff2');
            font-weight: normal;
            font-style: normal;
        }
        body {
            background-color: #fdf3e7;
            background-image: url('/static/parchment.png');
            background-size: cover;
            font-family: 'Old English Text MT', serif;
            color: #34210c;
            text-align: center;
        }
        h1 { font-size: 3rem; margin-top: 2rem; }
        form { margin-top: 2rem; }
        label { display: block; margin: 0.5rem; }
        input, select { font-size: 1rem; }
        button {
            font-family: inherit; background-color: #5a3e1b;
            color: #fdf3e7; border: none; padding: 0.5rem 1rem;
            cursor: pointer;
        }
        button:hover { background-color: #4a3317; }
        /* responsive tweaks */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            input, select { width: 90%; font-size: 1.1rem; }
            button { padding: 0.4rem 0.8rem; font-size: 1rem; }
        }
    </style>
</head>
<body class="{% if mobile %}mobile{% endif %}">
    <h1>Welcome to Tic Tac Toe!</h1>
    <form method="post" action="{{ url_for('start') }}">
        <label>
            Your name: <input type="text" name="name" required>
        </label>
        <label>
            Choose symbol:
            <select name="symbol">
                <option value="X">X (go first)</option>
                <option value="O">O (go second)</option>
            </select>
        </label>
        <br><br>
        <button type="submit">Start game</button>
    </form>
</body>
</html>
